<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escra — квартири Львів</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, system-ui, sans-serif;
      background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #111);
    }
    /* Keep the layout phone-shaped even on a wide desktop browser. */
    header, main { max-width: 480px; margin: 0 auto; }
    @media (min-width: 480px) {
      body { background: var(--tg-theme-secondary-bg-color, #f2f2f2); }
      header, main {
        background: var(--tg-theme-bg-color, #fff);
        box-shadow: 0 0 0 1px rgba(128,128,128,.15);
      }
    }
    header { position: sticky; top: 0; padding: 8px; z-index: 5; }
    .tabs { display: flex; gap: 6px; }
    .tabs button {
      flex: 1; padding: 10px 4px; border: none; border-radius: 10px; font-size: 14px;
      background: var(--tg-theme-secondary-bg-color, #eee); color: inherit; cursor: pointer;
    }
    .tabs button.active { background: var(--tg-theme-button-color, #3390ec); color: #fff; }
    main { padding: 8px; min-height: 100vh; }
    .card {
      border: 1px solid rgba(128,128,128,.25); border-radius: 14px; overflow: hidden;
      margin-bottom: 14px;
    }
    .carousel {
      position: relative; display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .carousel::-webkit-scrollbar { display: none; }
    .carousel img {
      width: 100%; height: 220px; scroll-snap-align: start; flex: 0 0 100%;
      object-fit: cover; cursor: pointer;
    }
    .dots {
      position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center;
      gap: 5px; pointer-events: none;
    }
    .dots span {
      width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.5);
    }
    .dots span.active { background: #fff; }
    .car-nav {
      position: absolute; top: 50%; transform: translateY(-50%); z-index: 2;
      border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px;
      line-height: 1; cursor: pointer; background: rgba(0,0,0,.35); color: #fff;
    }
    .car-prev { left: 8px; }
    .car-next { right: 8px; }
    .body { padding: 10px 12px; }
    .price { font-size: 18px; font-weight: 700; }
    .title { margin: 4px 0; }
    .meta { font-size: 13px; opacity: .8; }
    .badges { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: rgba(128,128,128,.2); }
    .actions { display: flex; gap: 8px; margin-top: 10px; }
    .actions a, .actions button {
      flex: 1; text-align: center; padding: 9px; border-radius: 10px; border: none;
      font-size: 14px; cursor: pointer; text-decoration: none; color: inherit;
      background: var(--tg-theme-secondary-bg-color, #eee);
    }
    .actions .like { background: #2ea44f; color: #fff; }
    .actions .hide { background: #b62324; color: #fff; }
    .empty { text-align: center; opacity: .6; margin-top: 40px; }
    form.settings { display: grid; gap: 12px; max-width: 400px; }
    form.settings label { display: grid; gap: 4px; font-size: 14px; }
    form.settings input, form.settings select {
      padding: 9px; border-radius: 10px; border: 1px solid rgba(128,128,128,.4);
      background: var(--tg-theme-bg-color, #fff); color: inherit;
    }
    form.settings button {
      padding: 11px; border: none; border-radius: 10px;
      background: var(--tg-theme-button-color, #3390ec); color: #fff; font-size: 15px;
    }
    .version-footer {
      margin-top: 24px; text-align: center; font-size: 12px; opacity: .5;
      font-family: ui-monospace, monospace;
    }
    .identity-picker {
      display: flex; flex-direction: column; gap: 12px; max-width: 320px;
      margin: 60px auto; padding: 0 16px;
    }
    .identity-picker button {
      padding: 16px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer;
      background: var(--tg-theme-button-color, #3390ec); color: #fff;
    }
    .lightbox {
      position: fixed; inset: 0; background: #000; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      overflow-x: auto; scroll-snap-type: x mandatory;
    }
    .lightbox[hidden] { display: none; }
    .lightbox img {
      width: 100%; height: 100%; flex: 0 0 100%; scroll-snap-align: start; object-fit: contain;
    }
    .lightbox .lb-close, .lightbox .lb-prev, .lightbox .lb-next {
      position: fixed; z-index: 51; border: none; background: rgba(0,0,0,.4); color: #fff;
      width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer;
    }
    .lightbox .lb-close { top: 14px; right: 14px; }
    .lightbox .lb-prev { top: 50%; left: 10px; transform: translateY(-50%); }
    .lightbox .lb-next { top: 50%; right: 10px; transform: translateY(-50%); }
    .lightbox .lb-counter {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%); z-index: 51;
      color: #fff; font-size: 13px; background: rgba(0,0,0,.4); padding: 3px 10px; border-radius: 999px;
    }
  </style>
</head>
<body>
  <header id="app-header" hidden>
    <div class="tabs">
      <button data-tab="new" class="active">Нові</button>
      <button data-tab="liked">Подобається</button>
      <button data-tab="hidden">Сховані</button>
      <button data-tab="settings">⚙️</button>
    </div>
  </header>
  <main id="content"><div class="empty">Завантаження…</div></main>

  <div id="lightbox" class="lightbox" hidden>
    <span class="lb-counter" id="lb-counter"></span>
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-prev" onclick="lightboxStep(-1)">‹</button>
    <button class="lb-next" onclick="lightboxStep(1)">›</button>
  </div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();
// Telegram supplies signed initData; a plain browser has none. That single
// check picks the mode — no server flag involved.
const INIT = tg?.initData || "";
const USER_KEY = "escra_user_id";

function webUserId() {
  return INIT ? null : localStorage.getItem(USER_KEY);
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      "X-Telegram-Init-Data": INIT,
      "X-User-Id": webUserId() || "",
      ...(opts.headers||{}),
    },
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

async function ensureIdentity() {
  // Inside Telegram, or a role already chosen in this browser — proceed.
  if (INIT || webUserId()) return true;
  // Plain browser, first visit — ask who's looking; the choice sticks in localStorage.
  const { users } = await fetch("/api/identities").then(r => r.json());
  document.getElementById("app-header").hidden = true;
  document.getElementById("content").innerHTML = `<div class="identity-picker">
    <div class="empty" style="margin:0 0 8px">Хто ти?</div>
    ${users.map(u => `<button onclick="pickIdentity(${u.id})">${esc(u.name)}</button>`).join("")}
  </div>`;
  return false;
}

function pickIdentity(id) {
  localStorage.setItem(USER_KEY, String(id));
  document.getElementById("app-header").hidden = false;
  loadTab(currentTab);
}
window.pickIdentity = pickIdentity;

const esc = s => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const EMOJI = { like: "👍", hide: "🙈" };

function partnerBadge(item) {
  if (!item.partner_reactions?.length) return "";
  return item.partner_reactions
    .map(r => `<span class="badge">${EMOJI[r.reaction]||"?"} партнер</span>`).join("");
}

const PHOTOS_BY_ID = {};

function carouselHTML(item) {
  const urls = item.image_urls || [];
  PHOTOS_BY_ID[item.id] = urls;
  if (!urls.length) return "";
  const imgs = urls.map((u, i) =>
    `<img src="${esc(u)}" loading="lazy" onclick="openLightbox(${item.id}, ${i})">`
  ).join("");
  if (urls.length === 1) return `<div class="carousel">${imgs}</div>`;
  const dots = `<div class="dots">${urls.map((_, i) => `<span data-i="${i}" class="${i===0?"active":""}"></span>`).join("")}</div>`;
  const nav = `
    <button class="car-nav car-prev" onclick="carouselStep(this, -1)">‹</button>
    <button class="car-nav car-next" onclick="carouselStep(this, 1)">›</button>`;
  return `<div class="carousel" onscroll="onCarouselScroll(this)">${imgs}${dots}${nav}</div>`;
}

function carouselStep(btn, delta) {
  const el = btn.parentElement;
  const imgCount = el.querySelectorAll("img").length;
  const index = Math.round(el.scrollLeft / el.clientWidth) + delta;
  const clamped = Math.max(0, Math.min(imgCount - 1, index));
  el.scrollTo({ left: clamped * el.clientWidth, behavior: "smooth" });
}
window.carouselStep = carouselStep;

function onCarouselScroll(el) {
  const index = Math.round(el.scrollLeft / el.clientWidth);
  const dots = el.querySelector(".dots");
  if (!dots) return;
  dots.querySelectorAll("span").forEach(d => d.classList.toggle("active", +d.dataset.i === index));
}

function cardHTML(item) {
  const meta = [
    item.rooms ? item.rooms + " кімн." : null,
    item.area ? Math.round(item.area) + " м²" : null,
    (item.floor !== null && item.floor !== undefined) ? "поверх " + item.floor : null,
  ].filter(Boolean).join(" · ");
  const owner = item.is_business ? "🏢 Агенція" : "👤 Власник";
  return `<div class="card">
    ${carouselHTML(item)}
    <div class="body">
      <div class="price">${item.price_value||"?"} ${esc(item.price_currency||"")}</div>
      <div class="title">${esc(item.title||"")}</div>
      <div class="meta">${item.district ? "📍 "+esc(item.district)+" · " : ""}${meta}</div>
      <div class="badges"><span class="badge">${owner}</span>${partnerBadge(item)}</div>
      <div class="actions">
        <a href="${esc(item.url||"#")}" target="_blank">Відкрити</a>
        <button class="like" onclick="react(${item.id},'like')">Подобається</button>
        <button class="hide" onclick="react(${item.id},'hide')">Сховати</button>
      </div>
    </div>
  </div>`;
}

let lbPhotos = [];

function openLightbox(id, index) {
  lbPhotos = PHOTOS_BY_ID[id] || [];
  if (!lbPhotos.length) return;
  const lb = document.getElementById("lightbox");
  lb.querySelectorAll("img").forEach(img => img.remove());
  lbPhotos.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    img.onclick = closeLightbox;
    lb.appendChild(img);
  });
  lb.hidden = false;
  lb.onscroll = () => updateLbCounter(Math.round(lb.scrollLeft / lb.clientWidth));
  scrollLbTo(index, false);
  updateLbCounter(index);
}
window.openLightbox = openLightbox;

function scrollLbTo(index, smooth = true) {
  const lb = document.getElementById("lightbox");
  lb.scrollTo({ left: index * lb.clientWidth, behavior: smooth ? "smooth" : "auto" });
}

function lightboxStep(delta) {
  const lb = document.getElementById("lightbox");
  const cur = Math.round(lb.scrollLeft / lb.clientWidth);
  scrollLbTo(Math.max(0, Math.min(lbPhotos.length - 1, cur + delta)));
}
window.lightboxStep = lightboxStep;

function updateLbCounter(index) {
  document.getElementById("lb-counter").textContent = `${index + 1} / ${lbPhotos.length}`;
}

function closeLightbox() {
  document.getElementById("lightbox").hidden = true;
}
window.closeLightbox = closeLightbox;

document.addEventListener("keydown", e => {
  if (document.getElementById("lightbox").hidden) return;
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") lightboxStep(-1);
  if (e.key === "ArrowRight") lightboxStep(1);
});

async function react(id, reaction) {
  await api("/api/react", { method: "POST", body: JSON.stringify({ listing_id: id, reaction }) });
  loadTab(currentTab);
}
window.react = react;

let currentTab = "new";

async function loadTab(tab) {
  currentTab = tab;
  const el = document.getElementById("content");
  if (tab === "settings") return loadSettings();
  el.innerHTML = `<div class="empty">Завантаження…</div>`;
  try {
    const data = await api(`/api/listings?tab=${tab}`);
    el.innerHTML = data.items.length
      ? data.items.map(cardHTML).join("")
      : `<div class="empty">Порожньо</div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">Помилка: ${esc(e.message)}</div>`;
  }
}

async function loadSettings() {
  const el = document.getElementById("content");
  const c = await api("/api/criteria");
  el.innerHTML = `<form class="settings" onsubmit="saveSettings(event)">
    <label>Кімнат від<input name="rooms_min" type="number" value="${c.rooms_min ?? ""}"></label>
    <label>Кімнат до<input name="rooms_max" type="number" value="${c.rooms_max ?? ""}"></label>
    <label>Макс. ціна<input name="price_max" type="number" value="${c.price_max ?? ""}"></label>
    <label>Валюта
      <select name="price_currency">
        <option ${c.price_currency==="UAH"?"selected":""}>UAH</option>
        <option ${c.price_currency==="USD"?"selected":""}>USD</option>
        <option ${c.price_currency==="EUR"?"selected":""}>EUR</option>
      </select>
    </label>
    <label>Не перший поверх
      <select name="exclude_first_floor">
        <option value="1" ${c.exclude_first_floor?"selected":""}>Так</option>
        <option value="0" ${!c.exclude_first_floor?"selected":""}>Ні</option>
      </select>
    </label>
    <button type="submit">Зберегти</button>
  </form>
  ${webUserId() ? `<div class="version-footer"><a href="#" onclick="changeRole(event)">Змінити роль</a></div>` : ""}
  <div class="version-footer" id="version-footer"></div>`;
  fetch("/api/version").then(r => r.json()).then(v => {
    document.getElementById("version-footer").textContent = `Версія: ${v.commit}`;
  }).catch(() => {});
}

async function saveSettings(ev) {
  ev.preventDefault();
  const f = ev.target;
  const body = {
    rooms_min: +f.rooms_min.value, rooms_max: +f.rooms_max.value,
    price_max: +f.price_max.value, price_currency: f.price_currency.value,
    exclude_first_floor: +f.exclude_first_floor.value,
  };
  await api("/api/criteria", { method: "POST", body: JSON.stringify(body) });
  tg?.showAlert?.("Збережено");
}
window.saveSettings = saveSettings;

function changeRole(ev) {
  ev.preventDefault();
  localStorage.removeItem(USER_KEY);
  ensureIdentity();
}
window.changeRole = changeRole;

document.querySelectorAll(".tabs button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadTab(btn.dataset.tab);
  };
});

(async () => {
  document.getElementById("app-header").hidden = false;
  if (await ensureIdentity()) loadTab("new");
})();
</script>
</body>
</html>
